<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesse no site</title>
</head>
<body>
    <div class="container">

        <div class="form-img">
            <img src="Online resume-cuate.svg"">
        </div>

        <form class="form">

            <div class="form-header">
                <h1>Cadastre-se</h1>
                <a href="#" class="login">Entrar</a>
            </div>

            <div class="input-grupo">
               

                   
                    <div class="bolinhas"><label>Primeiro nome</label><input type="text" placeholder="Digite seu primeiro nome" required></div>

                    <div class="bolinhas"><label>
                        Sobrenome</label><input type="text" placeholder="Digite seu sobrenome" required></div>

                    <div class="bolinhas"><label
                        >e-mail</label><input type="email"  placeholder="Digite seu e-mail" ></div>

                     <div class="bolinhas"><label
                        ">Telefone</label><input type="numero" maxlength="10" placeholder="(xx)xxxx-xxxx"></div>


                    <div class="bolinhas"><label
                        >Senha</label><input type="senha" maxlength="8"  placeholder="digite sua senha"></div>

                    <div class="bolinhas"><label
                        >Confirme sua senha</label><input type="senha" maxlength="8" placeholder="Confirme sua senha"></div>


                   

                
            </div>

           <div class="genero">
            <h1>Gênero</h1>

            
             <label><input type="radio" name="genero">Feminino</label>
             <label><input type="radio" name="genero">Masculino</label>
             <label><input type="radio" name="genero">Outros</label>
             <label><input type="radio"name="genero">Prefiro não dizer</label>





            
           </div>
           <button class="botao"><a href="#">Continuar</a></button>
        </form>
    </div>
    
</body>
</html>
